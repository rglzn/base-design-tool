<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Base Design Tool</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <!-- Three.js r128 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <!-- Supabase JS v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Top bar ────────────────────────────────────────────────────── -->
  <header id="topbar">
    <span class="topbar-logo">Base Design Tool</span>
    <div class="topbar-actions">
      <button id="btn-save-project" class="btn-action">Save Project</button>
      <button id="btn-load-project" class="btn-action">Load Project</button>
    </div>
  </header>

  <!-- ── Sidebar ───────────────────────────────────────────────────── -->
  <aside id="sidebar">

    <section class="sidebar-section" id="section-tools">
      <h3 class="sidebar-heading">Tools</h3>
      <div class="tool-group">
        <button class="btn-tool" id="tool-build"   data-tool="build">Build</button>
        <button class="btn-tool" id="tool-delete"  data-tool="delete">Delete</button>
        <button class="btn-tool" id="tool-select"  data-tool="select">Select</button>
      </div>
    </section>

    <section class="sidebar-section" id="section-colours">
      <h3 class="sidebar-heading">Colours</h3>
      <div id="colour-swatches" class="swatches-grid"></div>
      <button id="btn-add-colour" class="btn-secondary btn-sm">+ Add</button>
    </section>

    <section class="sidebar-section" id="section-objects">
      <h3 class="sidebar-heading">Objects</h3>
      <div class="object-grid">
        <button class="btn-object active" id="obj-cube" data-object="cube">
          <svg class="object-icon" viewBox="0 0 40 40" aria-hidden="true"><use href="#icon-cube" /></svg>
          <span class="object-label">Cube</span>
        </button>
        <button class="btn-object" id="obj-wall-plain" data-object="wall-plain">
          <svg class="object-icon" viewBox="0 0 40 40" aria-hidden="true"><use href="#icon-wall-plain" /></svg>
          <span class="object-label">Wall</span>
        </button>
        <button class="btn-object" id="obj-wall-window" data-object="wall-window">
          <svg class="object-icon" viewBox="0 0 40 40" aria-hidden="true"><use href="#icon-wall-window" /></svg>
          <span class="object-label">Window</span>
        </button>
        <button class="btn-object" id="obj-wall-doorway" data-object="wall-doorway">
          <svg class="object-icon" viewBox="0 0 40 40" aria-hidden="true"><use href="#icon-wall-doorway" /></svg>
          <span class="object-label">Doorway</span>
        </button>
        <button class="btn-object" id="obj-stair-solid" data-object="stair-solid">
          <svg class="object-icon" viewBox="0 0 40 40" aria-hidden="true"><use href="#icon-stair-solid" /></svg>
          <span class="object-label">Stair</span>
        </button>
        <button class="btn-object" id="obj-stair-thin" data-object="stair-thin">
          <svg class="object-icon" viewBox="0 0 40 40" aria-hidden="true"><use href="#icon-stair-thin" /></svg>
          <span class="object-label">Stair Thin</span>
        </button>
        <button class="btn-object" id="obj-wedge-solid" data-object="wedge-solid">
          <svg class="object-icon" viewBox="0 0 40 40" aria-hidden="true"><use href="#icon-wedge-solid" /></svg>
          <span class="object-label">Wedge</span>
        </button>
        <button class="btn-object" id="obj-wedge-thin" data-object="wedge-thin">
          <svg class="object-icon" viewBox="0 0 40 40" aria-hidden="true"><use href="#icon-wedge-thin" /></svg>
          <span class="object-label">Wedge Thin</span>
        </button>
      </div>
    </section>

    <section class="sidebar-section" id="section-stamps">
      <h3 class="sidebar-heading">Stamps</h3>
      <button id="btn-save-stamp" class="btn-secondary btn-sm" disabled>Save selection</button>
      <div id="stamp-list"></div>
    </section>

    <section class="sidebar-section" id="section-footprint">
      <h3 class="sidebar-heading">Footprint</h3>
      <p class="sidebar-readout" id="footprint-size">1 block</p>
      <button id="btn-edit-footprint" class="btn-secondary btn-sm">Edit</button>
    </section>

  </aside>

  <!-- ── Viewport ──────────────────────────────────────────────────── -->
  <main id="viewport">
    <!-- Three.js renderer canvas appended here by scene.js -->
    <div id="hud">
      <canvas id="compass-canvas" width="80" height="80" aria-label="Compass"></canvas>
      <div id="hud-direction" class="hud-direction" hidden>
        <span class="hud-direction-label">Direction</span>
        <span id="hud-direction-value" class="hud-direction-value">N</span>
        <span class="hud-direction-hint">Q ↺  E ↻</span>
      </div>
      <button id="btn-xray" class="btn-hud" disabled title="X-Ray (coming soon)">X-Ray</button>
    </div>
  </main>

  <!-- ── Modal templates ───────────────────────────────────────────── -->

  <!-- Generic danger confirmation modal -->
  <template id="tmpl-modal-danger">
    <div class="modal-overlay" role="dialog" aria-modal="true">
      <div class="modal-box">
        <div class="modal-danger-banner">Warning — Destructive Action</div>
        <p class="modal-body-text js-danger-message"></p>
        <div class="modal-actions">
          <button class="btn-secondary js-modal-cancel">Cancel</button>
          <button class="btn-danger js-modal-confirm">Confirm</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Footprint editor modal -->
  <template id="tmpl-modal-footprint">
    <div class="modal-overlay" role="dialog" aria-modal="true">
      <div class="modal-box modal-box--footprint">
        <div class="modal-header">
          <span class="modal-title">Edit Footprint</span>
          <button class="btn-icon js-modal-close" aria-label="Close">✕</button>
        </div>
        <p class="modal-hint">Max 6 blocks · Must stay connected</p>
        <div id="footprint-grid" class="footprint-grid"></div>
        <div class="modal-actions">
          <button class="btn-secondary js-modal-close">Done</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Colour picker modal -->
  <template id="tmpl-modal-colour">
    <div class="modal-overlay" role="dialog" aria-modal="true">
      <div class="modal-box modal-box--colour">
        <div class="modal-header">
          <span class="modal-title js-colour-modal-title">Add Colour</span>
          <button class="btn-icon js-modal-close" aria-label="Close">✕</button>
        </div>
        <div class="colour-picker-wrap">
          <input type="color" id="colour-picker-input" class="colour-picker-input" />
        </div>
        <div class="modal-actions">
          <button class="btn-secondary js-modal-cancel">Cancel</button>
          <button class="btn-primary js-colour-confirm">Apply</button>
        </div>
      </div>
    </div>
  </template>

  <!-- First-run modal — no cancel, shown when no active project exists -->
  <template id="tmpl-modal-first-run">
    <div class="modal-overlay modal-overlay--locked" role="dialog" aria-modal="true">
      <div class="modal-box">
        <div class="modal-header">
          <span class="modal-title">Welcome to Base Design Tool</span>
        </div>
        <div class="modal-body-text">
          <p class="modal-hint" style="padding:0 0 12px;">Name your first project to get started.</p>
          <input type="text" class="text-input js-project-name"
                 placeholder="Project name" maxlength="64" autocomplete="off" />
        </div>
        <div class="modal-actions">
          <button class="btn-primary js-first-run-create" disabled>Create</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Save Project modal -->
  <template id="tmpl-modal-save-project">
    <div class="modal-overlay" role="dialog" aria-modal="true">
      <div class="modal-box">
        <div class="modal-header">
          <span class="modal-title">Save Project</span>
          <button class="btn-icon js-modal-close" aria-label="Close">✕</button>
        </div>
        <div class="modal-body-text">
          <input type="text" class="text-input js-project-name"
                 placeholder="Project name" maxlength="64" autocomplete="off" />
        </div>
        <div class="modal-actions">
          <button class="btn-secondary js-modal-close">Cancel</button>
          <button class="btn-primary js-save-confirm" disabled>Save</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Load Project modal -->
  <template id="tmpl-modal-load-project">
    <div class="modal-overlay" role="dialog" aria-modal="true">
      <div class="modal-box modal-box--load">
        <div class="modal-header">
          <span class="modal-title">Load Project</span>
          <button class="btn-icon js-modal-close" aria-label="Close">✕</button>
        </div>
        <div class="project-list js-project-list">
          <!-- populated by ui.js -->
        </div>
        <div class="modal-actions">
          <button class="btn-secondary js-modal-close">Cancel</button>
        </div>
      </div>
    </div>
  </template>

  <!-- ── Error banner ───────────────────────────────────────────────── -->
  <div id="error-banner" class="error-banner" role="alert" aria-live="assertive"></div>

  <!-- ── SVG sprite ─────────────────────────────────────────────────── -->
  <svg id="svg-sprite" xmlns="http://www.w3.org/2000/svg"
       style="display:none" aria-hidden="true">

    <!-- Cube: isometric three-face view -->
    <symbol id="icon-cube" viewBox="0 0 40 40">
      <polygon points="20,3 37,12.5 20,22 3,12.5"   fill="currentColor" opacity="0.90"/>
      <polygon points="3,12.5 20,22 20,37 3,27.5"   fill="currentColor" opacity="0.55"/>
      <polygon points="37,12.5 20,22 20,37 37,27.5"  fill="currentColor" opacity="0.72"/>
    </symbol>

    <!-- Wall plain: upright slab, isometric front face + thin top -->
    <symbol id="icon-wall-plain" viewBox="0 0 40 40">
      <polygon points="5,10 35,10 35,35 5,35"       fill="currentColor" opacity="0.80"/>
      <polygon points="5,10 35,10 38,7 8,7"         fill="currentColor" opacity="0.55"/>
    </symbol>

    <!-- Wall window: plain wall with centred square pane -->
    <symbol id="icon-wall-window" viewBox="0 0 40 40">
      <polygon points="5,10 35,10 35,35 5,35"       fill="currentColor" opacity="0.80"/>
      <polygon points="5,10 35,10 38,7 8,7"         fill="currentColor" opacity="0.55"/>
      <rect x="13" y="16" width="14" height="12"    fill="currentColor" opacity="0.25"/>
      <rect x="13" y="16" width="14" height="12"    fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.90"/>
    </symbol>

    <!-- Wall doorway: plain wall with tall opening reaching the floor -->
    <symbol id="icon-wall-doorway" viewBox="0 0 40 40">
      <polygon points="5,10 35,10 35,35 5,35"       fill="currentColor" opacity="0.80"/>
      <polygon points="5,10 35,10 38,7 8,7"         fill="currentColor" opacity="0.55"/>
      <rect x="14" y="18" width="12" height="17"    fill="currentColor" opacity="0.25"/>
      <rect x="14" y="18" width="12" height="17"    fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.90"/>
    </symbol>

    <!-- Stair solid: isometric filled stepped wedge -->
    <symbol id="icon-stair-solid" viewBox="0 0 40 40">
      <!-- bottom step -->
      <polygon points="3,30 20,21 37,30 20,39"      fill="currentColor" opacity="0.90"/>
      <polygon points="3,30 20,39 20,34 3,25"       fill="currentColor" opacity="0.55"/>
      <polygon points="37,30 20,39 20,34 37,25"     fill="currentColor" opacity="0.72"/>
      <!-- top step -->
      <polygon points="11,21 20,16 29,21 20,26"     fill="currentColor" opacity="0.90"/>
      <polygon points="11,21 20,26 20,21 11,16"     fill="currentColor" opacity="0.55"/>
      <polygon points="29,21 20,26 20,21 29,16"     fill="currentColor" opacity="0.72"/>
      <!-- peak cap -->
      <polygon points="20,7 29,12 20,17 11,12"      fill="currentColor" opacity="0.90"/>
    </symbol>

    <!-- Stair thin: stepped surface only (no solid fill beneath) -->
    <symbol id="icon-stair-thin" viewBox="0 0 40 40">
      <polyline points="3,32 3,24 14,18 14,11 26,5 37,11 37,19 26,25 26,32 14,38 3,32"
                fill="currentColor" opacity="0.30"
                stroke="currentColor" stroke-width="1.5" opacity="0.90"/>
    </symbol>

    <!-- Wedge solid: isometric smooth filled wedge -->
    <symbol id="icon-wedge-solid" viewBox="0 0 40 40">
      <polygon points="20,4 37,13.5 37,28.5 20,19"  fill="currentColor" opacity="0.90"/>
      <polygon points="3,28.5 20,19 20,34 3,28.5"   fill="currentColor" opacity="0.55"/>
      <polygon points="37,13.5 20,19 20,34 37,28.5" fill="currentColor" opacity="0.72"/>
      <polygon points="3,28.5 20,4 37,13.5 20,19 3,28.5"
                                                     fill="currentColor" opacity="0.55"/>
    </symbol>

    <!-- Wedge thin: sloped surface only -->
    <symbol id="icon-wedge-thin" viewBox="0 0 40 40">
      <polygon points="3,32 20,6 37,15.5 37,30 20,36 3,32"
               fill="currentColor" opacity="0.25"
               stroke="currentColor" stroke-width="1.5"/>
    </symbol>

  </svg>

  <!-- ── Scripts (load order: app → scene → ui) ────────────────────── -->
  <script src="app.js"></script>
  <script src="scene.js"></script>
  <script src="ui.js"></script>

</body>
</html>
